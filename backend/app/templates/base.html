<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ptu{% endblock %}</title>
    <link rel="stylesheet" href="{{ static_url }}/css/app.css?t={{ cache_buster }}">
    <style>
        ::selection { background: rgba(95,125,98,0.22); }
        body { background: var(--bg-app); }
    </style>
</head>
<body data-desktop="{{ 'true' if desktop_mode else '' }}">
    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Custom Title Bar (desktop mode only) -->
    <div id="custom-titlebar" onmousedown="if (event.button === 0) Ptu.desktop.startDrag()">
        <div id="titlebar-drag">
            <div id="titlebar-icon">P</div>
            <span id="titlebar-text">Ptu {{ version }}</span>
        </div>
        <div id="titlebar-controls">
            <button class="titlebar-btn" onclick="Ptu.desktop.minimize()" aria-label="最小化">
                <svg viewBox="0 0 16 16"><rect x="3" y="8" width="10" height="1.5" rx="0.75" fill="currentColor"/></svg>
            </button>
            <button id="maximize-btn" class="titlebar-btn" onclick="Ptu.desktop.maximize()" aria-label="最大化">
                <svg viewBox="0 0 16 16"><rect x="3" y="3" width="10" height="10" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
            <button class="titlebar-btn titlebar-close" onclick="Ptu.desktop.close()" aria-label="关闭">
                <svg viewBox="0 0 16 16"><line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
        </div>
    </div>

    <!-- Hot Reload: 轮询检测服务器重载 → 自动刷新 -->
    <script>
    (function() {
        var currentId = null;
        function check() {
            fetch('/api/build-id')
                .then(function(r) { return r.json(); })
                .then(function(d) {
                    if (currentId === null) { currentId = d.id; return; }
                    if (currentId !== d.id) { location.reload(true); }
                })
                .catch(function() {});
        }
        setInterval(check, 1500);
    })();
    </script>

    <!-- Splash Screen -->
    <div id="splash">
        <div class="splash-logo">P</div>
        <div class="splash-spinner"></div>
        <p class="splash-text" id="splashStatus">加载中...</p>
    </div>

    <!-- App -->
    <div id="app" style="display:none">
        <!-- Top Bar -->
        <header id="topbar">
            <div id="topbar-left">
                <span id="app-title">Ptu</span>
                <span id="app-subtitle">抖音图文 / 视频下载工具</span>
            </div>
            <div id="topbar-right">
                <button class="theme-toggle" onclick="Ptu.toggleTheme()" title="切换深色/浅色模式">🌙</button>
                <span id="login-status" class="status-badge status-pending">未登录</span>
                <button id="logout-btn" class="btn-text" style="display:none">退出登录</button>
                <button id="clear-cache-btn" class="btn-text" title="清除浏览器缓存">清理缓存</button>
            </div>
        </header>

        <main id="content">
            {% block content %}{% endblock %}
        </main>

        <!-- Floating Log Panel -->
        <div id="log-panel" class="log-panel collapsed">
            <div id="log-toggle" class="log-toggle" onclick="Ptu.ui.toggleLogPanel()">
                <span id="log-indicator" class="log-indicator"></span>
                <span>运行日志</span>
                <span id="log-arrow" class="log-arrow">&#9650;</span>
            </div>
            <div id="log-body" class="log-body">
                <div class="log-toolbar">
                    <span id="log-count" class="log-count">0 条</span>
                    <button class="btn-text btn-xs" onclick="Ptu.ui.exportLogs()">导出</button>
                    <button class="btn-text btn-xs" onclick="Ptu.ui.showLogFiles()">历史文件</button>
                </div>
                <div id="log-files-section" class="log-files-section hidden">
                    <div id="log-files-list"></div>
                </div>
                <pre id="log-content" class="log-content">等待日志...</pre>
            </div>
        </div>
    </div>

    <script src="{{ static_url }}/js/app.js?t={{ cache_buster }}"></script>
    <script>
    // Splash lifecycle
    (function() {
        var splash = document.getElementById('splash');
        var app = document.getElementById('app');
        var start = Date.now();
        var status = document.getElementById('splashStatus');

        fetch('/api/login/status')
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (status) status.textContent = d.logged_in ? '已登录' : '准备就绪';
                setTimeout(function() {
                    splash.classList.add('animate-out');
                    setTimeout(function() {
                        splash.style.display = 'none';
                        if (app) app.style.display = 'flex';
                        // 未登录提示（不弹二维码）
                        if (!d.logged_in && typeof Ptu !== 'undefined') {
                            setTimeout(function() { Ptu.ui.loginModal.open(); }, 800);
                        }
                    }, 500);
                }, Math.max(0, 1200 - (Date.now() - start)));
            })
            .catch(function() {
                setTimeout(function() {
                    splash.classList.add('animate-out');
                    setTimeout(function() {
                        splash.style.display = 'none';
                        if (app) app.style.display = 'flex';
                    }, 500);
                }, Math.max(0, 1200 - (Date.now() - start)));
            });
    })();
    </script>
</body>
</html>
